<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Encok-Cok Analytics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #071018;
      --bg2: #0e1d2b;
      --card: rgba(255, 255, 255, 0.08);
      --text: #edf6ff;
      --muted: #b5c8d8;
      --primary: #2dd4bf;
      --accent: #f59e0b;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: "Segoe UI", "Trebuchet MS", sans-serif;
      background:
        radial-gradient(1000px 400px at -20% -10%, #11334f 0%, transparent 60%),
        radial-gradient(800px 360px at 120% -30%, #1c4749 0%, transparent 55%),
        linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      min-height: 100vh;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .panel {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(8px);
      border-radius: 14px;
      padding: 12px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    select, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(0, 0, 0, 0.25);
      color: var(--text);
      padding: 9px 10px;
      font-size: 0.96rem;
    }

    button {
      border: none;
      cursor: pointer;
      background: linear-gradient(110deg, var(--primary), #22c55e);
      color: #03202a;
      font-weight: 700;
      margin-top: 24px;
    }

    button:hover { filter: brightness(1.06); }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 8px 0 16px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(245, 158, 11, 0.2);
    }

    .dot.ok {
      background: #22c55e;
      box-shadow: 0 0 0 6px rgba(34, 197, 94, 0.2);
    }

    .dot.err {
      background: var(--danger);
      box-shadow: 0 0 0 6px rgba(239, 68, 68, 0.2);
    }

    .chart {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 12px;
      min-height: 420px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Encok-Cok Analytics Dashboard</h1>
    <p class="subtitle">Custom Go service untuk ingest MQTT ke InfluxDB dan visualisasi data sensor.</p>

    <div class="controls">
      <div class="panel">
        <label for="field">Metric</label>
        <select id="field">
          <option value="roll">roll</option>
          <option value="pitch">pitch</option>
          <option value="gx">gx</option>
          <option value="gy">gy</option>
          <option value="gz">gz</option>
        </select>
      </div>

      <div class="panel">
        <label for="range">Range</label>
        <select id="range">
          <option value="15m">15 menit</option>
          <option value="1h" selected>1 jam</option>
          <option value="6h">6 jam</option>
          <option value="24h">24 jam</option>
        </select>
      </div>

      <div class="panel">
        <label for="window">Agregasi</label>
        <select id="window">
          <option value="1s">1s</option>
          <option value="2s" selected>2s</option>
          <option value="5s">5s</option>
          <option value="10s">10s</option>
        </select>
      </div>

      <div class="panel">
        <button id="refreshBtn">Refresh</button>
      </div>
    </div>

    <div class="status">
      <span class="dot" id="dot"></span>
      <span id="statusText">Menunggu data...</span>
    </div>

    <div class="chart">
      <canvas id="chartCanvas"></canvas>
    </div>
  </div>

  <script>
    const field = document.getElementById('field');
    const range = document.getElementById('range');
    const windowSize = document.getElementById('window');
    const refreshBtn = document.getElementById('refreshBtn');
    const statusText = document.getElementById('statusText');
    const dot = document.getElementById('dot');

    const ctx = document.getElementById('chartCanvas').getContext('2d');
    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [{
          label: 'Sensor Value',
          data: [],
          borderWidth: 2,
          borderColor: '#2dd4bf',
          pointRadius: 0,
          fill: true,
          backgroundColor: 'rgba(45, 212, 191, 0.14)',
          tension: 0.25
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          x: {
            ticks: { color: '#b5c8d8', maxTicksLimit: 10 },
            grid: { color: 'rgba(255, 255, 255, 0.06)' }
          },
          y: {
            ticks: { color: '#b5c8d8' },
            grid: { color: 'rgba(255, 255, 255, 0.08)' }
          }
        },
        plugins: {
          legend: {
            labels: { color: '#edf6ff' }
          }
        }
      }
    });

    async function loadData() {
      const params = new URLSearchParams({
        field: field.value,
        range: range.value,
        window: windowSize.value
      });

      try {
        statusText.textContent = 'Mengambil data dari InfluxDB...';
        dot.className = 'dot';

        const res = await fetch(`/api/series?${params.toString()}`);
        if (!res.ok) throw new Error('HTTP ' + res.status);

        const payload = await res.json();
        const labels = payload.data.map(p => new Date(p.time).toLocaleTimeString());
        const values = payload.data.map(p => p.value);

        chart.data.labels = labels;
        chart.data.datasets[0].label = `${payload.field} (${payload.range})`;
        chart.data.datasets[0].data = values;
        chart.update();

        statusText.textContent = `Menampilkan ${values.length} titik data (${payload.field})`;
        dot.className = values.length > 0 ? 'dot ok' : 'dot';
      } catch (err) {
        statusText.textContent = 'Gagal mengambil data: ' + err.message;
        dot.className = 'dot err';
      }
    }

    field.addEventListener('change', loadData);
    range.addEventListener('change', loadData);
    windowSize.addEventListener('change', loadData);
    refreshBtn.addEventListener('click', loadData);

    loadData();
    setInterval(loadData, 5000);
  </script>
</body>
</html>
