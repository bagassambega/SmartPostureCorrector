; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; -mtext-section-literals: scatters the Xtensa LX6 literal pool (float constants)
; inline within the .text section instead of collecting them at the end of the section.
; Required because the generated Random Forest predict() function is extremely large
; (~357k lines) and the aggregated literal pool would exceed the 256KB l32r range limit,
; causing "dangerous relocation: l32r: literal target out of range" linker errors.
build_flags =
  -mtext-section-literals

; Include both src/ (application code) and model/ (generated RF tree shards).
; Paths in build_src_filter are relative to src_dir (src/), so ../model/ resolves
; to hardware/sensor/model/ which is excluded from git via .gitignore.
build_src_filter = +<*> +<../model/>

; no_ota partition gives the full 1MB+ code area to the app since OTA is not needed
; for an edge AI deployment with a model this large.
board_build.partitions = no_ota.csv

lib_deps =
  knolleary/PubSubClient @ ^2.8
  bblanchon/ArduinoJson @ ^7.0.4