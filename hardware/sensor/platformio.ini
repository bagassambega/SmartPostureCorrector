; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; emlearn model (randomforest_model.h) lives at <repo_root>/model/.
; -I../../model adds that directory to the compiler include search path so
; sensor.cpp can #include it directly without copying or splitting.
; -mtext-section-literals is no longer strictly required (the emlearn model is
; 19k lines vs the prior 357k), but kept as a safety margin for future models.
build_flags =
  -mtext-section-literals
  -I../../model

; no_ota partition kept for extra code flash headroom.
board_build.partitions = no_ota.csv

lib_deps =
  knolleary/PubSubClient @ ^2.8
  bblanchon/ArduinoJson @ ^7.0.4